name: Feature request
description: Suggest an improvement to browser-bridge
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation are you trying to improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior, CLI/API shape, or docs improvement you want.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Add links, examples, prior art, or constraints that should shape the change.
