name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish packages after the readiness checks pass
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      NPM_CONFIG_PROVENANCE: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Agent Skills validator
        run: python -m pip install skills-ref

      - name: Install Playwright Chromium
        run: bun run playwright:install

      - name: Build
        run: bun run build

      - name: Validate docs, skill, and packaging
        run: |
          bun run docs:check
          bun run skill:check
          bun run skill:validate
          bun run pack:check
          bun run consumer:smoke
          bun ./scripts/release-check.mjs

      - name: Publish with Changesets
        if: ${{ inputs.publish }}
        uses: changesets/action@v1
        with:
          version: bun run changeset:version
          publish: bun x changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Report dry-run completion
        if: ${{ !inputs.publish }}
        run: echo "Release readiness checks passed. Publishing was not requested."
