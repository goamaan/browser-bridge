name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Agent Skills validator
        run: python -m pip install skills-ref

      - name: Install Playwright Chromium
        run: bun run playwright:install

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test

      - name: Build
        run: bun run build

      - name: Generated docs check
        run: bun run docs:check

      - name: Packaged skill check
        run: bun run skill:check

      - name: Skill validation
        run: bun run skill:validate

      - name: Pack validation
        run: bun run pack:check

      - name: Consumer smoke test
        run: bun run consumer:smoke

      - name: Managed smoke test
        run: bun run smoke:managed

  publish-readiness:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Detect npm publish auth
        id: npm-auth
        shell: bash
        run: |
          if npm whoami >/tmp/npm-whoami.txt 2>/tmp/npm-whoami.err; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "username=$(cat /tmp/npm-whoami.txt)" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/npm-whoami.err
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Pack validation
        run: bun run pack:check

      - name: Consumer smoke test
        run: bun run consumer:smoke

      - name: Publish readiness
        if: steps.npm-auth.outputs.ready == 'true'
        run: bun run release:check

      - name: Skip publish readiness without valid npm auth
        if: steps.npm-auth.outputs.ready != 'true'
        run: echo "Skipping publish readiness because npm auth is unavailable on this runner."
